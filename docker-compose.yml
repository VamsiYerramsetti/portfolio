services:
  web:
    build: .
    ports:
      - "3002:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_TELEMETRY_DISABLED=1
    command: npm run dev -- -H 0.0.0.0 -p 3000

  export-preview:
    profiles: ["export"]
    build: .
    ports:
      - "3001:3000"
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      # IMPORTANT: For GitHub Pages preview, set NEXT_PUBLIC_BASE_PATH to '/portfolio'
      - NEXT_PUBLIC_BASE_PATH=/portfolio
    command: sh -lc "npm run build && node scripts/serve-export.mjs"
